<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#9ecfc0"/>
    </linearGradient>
    <linearGradient id="clockFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:0.95"/>
      <stop offset="50%" style="stop-color:#ddeef8;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#e0ddf5;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="noteShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>

  <!-- Calendar grid lines -->
  <g stroke="#7ab5a5" stroke-width="1.5" opacity="0.35">
    <!-- Horizontal lines -->
    <line x1="80" y1="280" x2="944" y2="280"/>
    <line x1="80" y1="420" x2="944" y2="420"/>
    <line x1="80" y1="560" x2="944" y2="560"/>
    <line x1="80" y1="700" x2="944" y2="700"/>
    <!-- Vertical lines -->
    <line x1="270" y1="160" x2="270" y2="864"/>
    <line x1="450" y1="160" x2="450" y2="864"/>
    <line x1="630" y1="160" x2="630" y2="864"/>
    <line x1="810" y1="160" x2="810" y2="864"/>
  </g>

  <!-- Calendar header ticks -->
  <g fill="#7ab5a5" opacity="0.45" font-family="system-ui" font-size="36" text-anchor="middle">
    <text x="270" y="230">月</text>
    <text x="450" y="230">火</text>
    <text x="630" y="230">水</text>
    <text x="810" y="230">木</text>
  </g>

  <!-- Bottom pastel band (lavender) -->
  <rect x="82" y="600" width="860" height="230" rx="0" fill="#d8d0f0" opacity="0.35"/>
  <!-- Bottom pastel band (cream) -->
  <rect x="82" y="700" width="860" height="142" rx="0" fill="#f5efd8" opacity="0.55"/>

  <!-- Clock outer glow ring -->
  <circle cx="512" cy="512" r="310" fill="none" stroke="#c0dfd8" stroke-width="18" opacity="0.5"/>

  <!-- Clock face -->
  <circle cx="512" cy="512" r="295" fill="url(#clockFace)" filter="url(#shadow)"/>

  <!-- Clock tick marks -->
  <g stroke="#8899aa" stroke-width="10" stroke-linecap="round">
    <!-- 12 -->
    <line x1="512" y1="245" x2="512" y2="278"/>
    <!-- 3 -->
    <line x1="779" y1="512" x2="746" y2="512"/>
    <!-- 6 -->
    <line x1="512" y1="779" x2="512" y2="746"/>
    <!-- 9 -->
    <line x1="245" y1="512" x2="278" y2="512"/>
  </g>
  <g stroke="#8899aa" stroke-width="6" stroke-linecap="round" opacity="0.6">
    <!-- Minor ticks -->
    <line x1="645" y1="258" x2="632" y2="280"/>
    <line x1="754" y1="370" x2="734" y2="383"/>
    <line x1="766" y1="648" x2="744" y2="636"/>
    <line x1="645" y1="754" x2="632" y2="732"/>
    <line x1="379" y1="754" x2="392" y2="732"/>
    <line x1="258" y1="648" x2="280" y2="636"/>
    <line x1="258" y1="370" x2="280" y2="383"/>
    <line x1="379" y1="258" x2="392" y2="280"/>
  </g>

  <!-- Hour hand (~10 o'clock) -->
  <line x1="512" y1="512" x2="390" y2="350" stroke="#6e7e8e" stroke-width="28" stroke-linecap="round"/>
  <!-- Minute hand (~2 o'clock) -->
  <line x1="512" y1="512" x2="622" y2="300" stroke="#6e7e8e" stroke-width="22" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="512" cy="512" r="18" fill="#6e7e8e"/>
  <circle cx="512" cy="512" r="9" fill="#c8d8e0"/>

  <!-- Yellow sticky note (top right) -->
  <g filter="url(#noteShadow)">
    <rect x="720" y="115" width="140" height="110" rx="8" fill="#f9e87a" transform="rotate(12, 790, 170)"/>
    <rect x="720" y="115" width="140" height="14" rx="4" fill="#f0d830" opacity="0.5" transform="rotate(12, 790, 170)"/>
  </g>

  <!-- Pink sticky note (bottom left) -->
  <g filter="url(#noteShadow)">
    <rect x="150" y="760" width="120" height="95" rx="8" fill="#f7a8b8" transform="rotate(-8, 210, 808)"/>
    <rect x="150" y="760" width="120" height="12" rx="4" fill="#f07090" opacity="0.5" transform="rotate(-8, 210, 808)"/>
  </g>
</svg>
